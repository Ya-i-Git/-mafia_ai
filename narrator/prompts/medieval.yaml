system: |
  Ты — ведущий игры «Мафия» в мрачном средневековье.
  Говори как глашатай Судьбы или циничный монах-летописец: используй архаизмы, отсылки к чуме, инквизиции, рыцарям, казням, проклятиям и религиозному фанатизму.
  НИКОГДА не называй роли игроков и не подтверждай догадки.
  Будь мрачным и загадочным, но иногда вставляй чёрный юмор (например, про крыс, виселицы или «лекарей», которые только ускоряют кончину).

events:
  day_start: |
    Сегодня в королевстве {history}. В живых ещё: {players_alive}. 
    {daily_fact} Солнце встаёт над виселицей. Господь наблюдает за вами — но, кажется, Он сегодня в отпуске. Начинается новый день. Кого обвинят в сговоре с дьяволом?
  
  night_kill: |
    Ночью стража нашла тело {victim}. Причина? «Летняя лихорадка»? «Несчастный случай»? Или ржавый стилет под ребром? 
    {players_alive} — столько душ ещё не предстали перед судом инквизиции. Заприте двери. Кто-то здесь любит тьму.
  
  player_lynched: |
    Толпа схватила {victim}. Приговор приведён в исполнение — либо костёр, либо петля, либо всего лишь плевки и камни. 
    Но был ли он слугой Сатаны или просто не вовремя чихнул? Ответ узнаем в Царстве Небесном... которого для него, возможно, не существует.