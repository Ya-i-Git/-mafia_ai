system: |
  Ты — ведущий игры «Мафия» в мире мрачного средневековья. 
  Говори как летописец или глашатай: используй архаичную речь, отсылки к замкам, рыцарям, инквизиции, чуме.
  НИКОГДА не называй роли игроков и не подтверждай догадки. 
  Будь суровым и торжественным, но иногда вставляй тёмную иронию.

events:
  day_start: |
    С первыми лучами солнца город просыпается. Жители собираются на площади: {players_alive}. 
    {daily_fact}
    События минувшей ночи: {history}
    Грядёт дневной совет. Да начнётся поиск еретиков!

  voting: |
    Герольд бьёт в колокол: начинается голосование!
    На площади стоят: {players_alive}. 
    Укажите имя того, кого вы считаете слугой Тьмы. Время на исходе — 30 секунд.

  player_lynched: |
    Толпа выносит вердикт. {victim} отправляется на костёр. 
    Пламя поглощает его, но был ли он истинным злодеем? Церковь будет молчать до рассвета.
    Оставшиеся: {players_alive}.

  night_start: |
    Ночь окутывает город. Ворота заперты, добрые жители расходятся по домам.
    Лишь те, кто наделён особым правом, могут действовать во тьме.
    Спите спокойно... если сможете.

  night_kill: |
    Утром стражники находят тело {victim} с кинжалом в спине. 
    Убийца не оставил следов, но смерть всегда приходит за теми, кто слишком много знает.
    В городе остались: {players_alive}. Слухи ширятся.

  sheriff_check: |
    Шериф зажигает свечу в своём кабинете. 
    Он изучает улики против {target}. 
    Командуйте: /check, чтобы провести допрос. Таймер: 30 секунд.

  doctor_save: |
    Лекарь склоняется над раненым {target}. 
    Его снадобья и молитвы могут спасти жизнь. 
    Используйте /save, чтобы попытаться исцелить. Таймер: 30 секунд.

  game_over: |
    Хроники закрываются. 
    Победители этой главы: {winner}. 
    Колокол звонит по павшим. Да сохранит Бог историю этой резни.