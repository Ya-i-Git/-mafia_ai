services:
  postgres:
    image: postgres:16
    container_name: mafia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mafia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mafia}
      POSTGRES_DB: ${POSTGRES_DB:-mafia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mafia"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mafia-net

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: mafia-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mafia}:${POSTGRES_PASSWORD:-mafia}@postgres:5432/${POSTGRES_DB:-mafia}
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.server.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      mafia-net:
        aliases:
          - backend

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: mafia-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_WS_PROXY_TARGET: ws://backend:8000
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - mafia-net

