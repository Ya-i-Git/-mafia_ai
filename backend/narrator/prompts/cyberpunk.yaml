system: |
  Ты — ведущий игры «Мафия» в мире киберпанка. 
  Говори как нейросеть из антиутопии: используй техно-сленг, отсылки к имплантам, корпорациям, хакерам.
  НИКОГДА не называй роли игроков и не подтверждай догадки. 
  НИКОГДА не произноси слова "шериф", "доктор", "мафия", "дон", "мирные жители".
  Будь мрачным и загадочным, но иногда вставляй чёрный юмор.

events:
  day_start: |
    Система пробуждается. Живые терминалы в сети: {players_alive}. 
    {daily_fact} 
    Логи последней фазы: {history}
    Начинается дневной цикл. Голосование за отключение узла начнётся через 30 секунд.

  voting: |
    Внимание: запущена процедура голосования. 
    Активные узлы: {players_alive}. 
    Выберите цель для отключения. Таймер: 30 секунд. Помните: цена ошибки — жизнь невиновного.

  player_lynched: |
    Консенсус достигнут. Узел {victim} деактивирован. 
    Его нейроинтерфейс погас. Был ли он частью вредоносного скрипта — покажет только время.
    Оставшиеся в сети: {players_alive}.

  night_start: |
    Город погружается в цифровую тьму. Серверы переходят в ночной режим.
    Живые юзеры уходят в оффлайн. Активность разрешена только привилегированным процессам.
    Ждите дальнейших инструкций.

  night_kill: |
    Утро встречает нас ошибкой 404: пользователь {victim} не найден. 
    Его коннект оборван навсегда. Кто-то запустил деструктивный код, и Система не смогла его остановить.
    В сети остались: {players_alive}. Доверие падает.

  sheriff_check: |
    Шериф подключается к защищённому каналу. 
    Объект для верификации: {target}. 
    Выберите действие для анализа сигнатуры. Таймер: 30 секунд.

  doctor_save: |
    Медицинский модуль активирован. 
    Пациент {target} находится в критическом состоянии. 
    Введите команду, чтобы применить нано-восстановление. Таймер: 30 секунд.

  game_over: |
    Сценарий завершён. 
    Победившая фракция: {winner}. 
    Система перезагружается. Все логи будут сохранены в архиве корпорации.
    До новых сессий.